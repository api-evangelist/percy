aid: percy
url: https://raw.githubusercontent.com/api-evangelist/percy/refs/heads/main/apis.yml
name: Percy
kind: company
description: Percy is an all-in-one visual testing and review platform, now part of
  BrowserStack. Test frameworks and CI upload DOM snapshots via the Percy CLI/SDK;
  Percy renders them across browsers and widths, diffs each against an approved
  baseline, and surfaces pixel-level visual changes for review and approval. On top
  of that workflow Percy exposes a documented REST API under https://percy.io/api/v1
  for reading and managing Projects, Builds, and Snapshots, plus Visual Git
  (branchline) sync and merge operations. The snapshot capture/upload path itself is
  driven by the open-source Percy CLI and SDKs rather than a public REST upload
  endpoint.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Visual Testing
- Visual Regression
- Screenshots
- QA
- Testing
- CI/CD
- BrowserStack
