meters:
- name: screenshots
  description: Rendered snapshots per browser/width, the primary billed unit. Included up to the plan allowance, then billed as overage.
  unit: screenshots
  aggregation: sum
  dimensions:
  - account
  - project
  - build
- name: overage_screenshots
  description: Screenshots consumed beyond the plan's included monthly allowance, billed at the overage rate.
  unit: screenshots
  aggregation: sum
  dimensions:
  - account
  - project
principles:
- name: Visibility
  description: Track monthly screenshot consumption per project and build against the plan allowance; watch for overage.
- name: Allocation
  description: Use separate Percy projects per app/team so screenshot spend maps to internal cost centers.
- name: Optimization
  description: Reduce screenshot volume by scoping snapshots, trimming redundant browser/width combinations, and using responsive-width and ignore settings so only meaningful views are rendered.
- name: Accountability
  description: Assign owners per project; review monthly screenshot usage and overage against budget and plan tier.
