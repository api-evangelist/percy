description: >-
  FinOps view of Percy spend. Percy (part of BrowserStack) bills primarily on
  screenshots consumed per month - one rendered snapshot at one browser/width equals
  one screenshot. A free plan includes 5,000 screenshots/month; paid plans raise the
  included allowance and build-history retention, and usage above the included units
  is billed as overage. The REST API adds no separate line item; API-driven activity
  draws on the same screenshot pool as CLI/SDK-driven builds. Enterprise agreements
  and BrowserStack platform bundling cover high-volume needs.
notes: >-
  Paid per-unit prices and overage rates are set on the BrowserStack pricing page
  and are not reconciled here. The dominant cost driver is screenshot volume, which
  scales with the number of snapshots multiplied by the browsers and responsive
  widths each snapshot is rendered against.
